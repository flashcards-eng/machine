name: Generate songs.json

on:
  push:
    branches:
      - main
      - master
    paths:
      - "songs/**"
      - ".github/workflows/generate-songs-json.yml"
      - "index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-songs-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate songs.json from playlist folders
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p songs

          python3 <<'PY'
          import json, re
          from pathlib import Path

          songs_dir = Path("songs")
          playlist_names = ["relaxing", "energetic"]

          def pretty_title(name: str) -> str:
              title = re.sub(r"\.[^.]+$", "", name)                 # remove extension
              title = re.sub(r"[_-]+", " ", title)                  # separators -> spaces
              title = re.sub(r"^\s*\d+\s*[\.\-]?\s*", "", title)    # leading track number
              title = re.sub(r"\s+", " ", title).strip()
              if not title:
                  return name
              return " ".join(word[:1].upper() + word[1:] for word in title.split(" "))

          def natural_sort_key(s: str):
              return [int(t) if t.isdigit() else t.lower() for t in re.split(r"(\d+)", s)]

          playlists = {}

          for pl in playlist_names:
              folder = songs_dir / pl
              tracks = []

              if folder.exists():
                  for p in folder.rglob("*"):
                      if p.is_file() and p.suffix.lower() == ".mp3":
                          rel = p.as_posix()  # e.g. songs/relaxing/file.mp3
                          tracks.append({
                              "title": pretty_title(p.name),
                              "file": rel
                          })

              tracks.sort(key=lambda x: natural_sort_key(x["file"]))
              playlists[pl] = tracks

          # Optional "all" playlist (combined)
          all_tracks = []
          for pl in playlist_names:
              all_tracks.extend(playlists.get(pl, []))

          output = {
              "playlists": playlists,
              "defaultPlaylist": "relaxing",
              "all": all_tracks
          }

          with open("songs.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
              f.write("\n")

          print("Generated songs.json:")
          for pl in playlist_names:
              print(f"  - {pl}: {len(playlists[pl])} tracks")
          print(f"  - all: {len(all_tracks)} tracks")
          PY

      - name: Commit songs.json if changed
        shell: bash
        run: |
          set -euo pipefail
      
          # Stage songs.json first (works for new file + existing file changes)
          git add songs.json
      
          # If nothing staged, exit
          if git diff --cached --quiet; then
            echo "No changes to songs.json"
            exit 0
          fi
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          git commit -m "chore: update songs.json [skip ci]"
          git push
